<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Bibliotecario</title>
  <link rel="stylesheet" href="diseño.css">
  <link rel="stylesheet" href="panel_bibliotecario.css">
</head>

<body>

<header class="navbar">
  <h2 class="logo">Biblioteca CUDI</h2>

  <div class="navbar-right">
    <a href="index.html" class="btn-inicio">Inicio</a>

    <div class="perfil" id="perfil">
      <span class="icono">
        <svg xmlns="http://www.w3.org/2000/svg" height="22" viewBox="0 0 24 24" width="22" fill="#bdc3c7">
          <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 
          2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 
          1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
        </svg>
      </span>

      <div class="menu-perfil" id="menuPerfil">
        <button>Mi perfil</button>
        <button id="logout">Cerrar sesión</button>
      </div>
    </div>
  </div>
</header>

<section class="panel-bibliotecario">

  <h1>Panel Bibliotecario</h1>

  <div class="panel-opciones">
    <div class="card-opcion" onclick="mostrarLibros()">LIBROS</div>
    <div class="card-opcion" onclick="mostrarNotificaciones()">NOTIFICACIONES</div>
    <div class="card-opcion" onclick="mostrarCrearUsuario()">CREAR CUENTA</div>
  </div>

  <!--  ESTE ES EL CONTENEDOR DINÁMICO -->
  <div id="contenidoPanel" class="contenido-panel"></div>

</section>


<!--  JS SIEMPRE AL FINAL -->
<script src="panel_bibliotecario.js"></script>

</body>
</html>
