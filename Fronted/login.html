<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Biblioteca CUDI</title>
    <link rel="stylesheet" href="diseño.css">
</head>

<body class="login-page">
    <div class="login-container">
        <h2>Iniciar Sesión</h2>

        <form id="loginForm" novalidate>
            <label for="dni" style="display: none;">Usuario</label>
            <input 
             type="text" 
             id="dni" 
             placeholder="Ingrese DNI sin puntos" 
             aria-label="Usuario (DNI)" 
             required
            >
        <span id="dniError" class="error-message"></span>

            <label for="password" style="display: none;">Contraseña</label>
            <input type="password" id="password" placeholder="Contraseña" aria-label="Contraseña" required>
            <span id="passwordError" class="error-message"></span>

            <button id="submitLoginBtn" type="submit" aria-label="Botón para enviar formulario de login">Ingresar</button>
            <p id="loginGeneralError" class="error-message"></p>
        </form>

        <div class="extra-links">
            <button id="forgotPasswordLink" class="link-button" type="button">¿Olvidaste tu contraseña?</button><br>
            <p class="info-login">
                Si no tenés una cuenta, solicitá acceso a tu profesor o al bibliotecario para que te registren.
            </p>
            <a href="index.html" class="boton" style="margin-top: 12px; display: inline-block;">Volver a Inicio</a>
        </div>

        <div id="recoverContainer" class="recover-container hidden">
            <h3>Recuperar contraseña</h3>
            <form id="recoverForm" novalidate>
                <label for="recoverEmail" style="display: none;">Correo electrónico</label>
                <input type="email" id="recoverEmail" placeholder="Ingresa tu correo" aria-label="Correo electrónico para recuperar contraseña" required>
                <span id="recoverEmailError" class="error-message"></span>

                <button type="submit" class="boton">Enviar solicitud</button>
                <button type="button" id="cancelRecover" class="boton secondary">Volver al login</button>
                <p id="recoverMessage" class="success-message"></p>
            </form>
        </div>
    </div>
<script src="app.js"></script>
</body>
</html>
